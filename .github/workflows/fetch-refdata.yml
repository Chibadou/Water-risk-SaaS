# Fetches reference geodata (department polygons + ZRE commune membership) on a
# GitHub runner with full network access, unlike the dev sandbox, and commits
# the outputs back to the branch. Triggered by pushes touching the request file.
name: Fetch reference geodata

on:
  push:
    branches:
      - "claude/session-sdplfe"
    paths:
      - "data/refdata-request.json"
      - ".github/workflows/fetch-refdata.yml"
      - "scripts/refdata/fetch_refdata.py"

permissions:
  contents: write

concurrency:
  group: fetch-refdata
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet requests geopandas shapely

      - name: Fetch reference geodata
        run: python scripts/refdata/fetch_refdata.py

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/refdata
          if git diff --cached --quiet; then
            echo "No output changes to commit."
          else
            git commit -m "chore(refdata): geodata from Actions run ${{ github.run_id }}"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
